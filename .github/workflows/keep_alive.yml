name: Keep Alive Render Backend

on:
  schedule:
    # Runs every 12 minutes (Render Free tier sleeps after 15 minutes of inactivity)
    - cron: '*/12 * * * *'
  workflow_dispatch: # Allows manual trigger from GitHub interface

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Backend
        run: |
          # Replace the URL below with your live Render URL once it is deployed
          RENDER_URL="https://fastapi-face-attendance.onrender.com/docs"
          echo "Pinging $RENDER_URL..."
          status_code=$(curl -s -o /dev/null -w "%{http_code}" "$RENDER_URL")
          echo "Response code: $status_code"
